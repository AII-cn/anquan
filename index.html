<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>湖南省建筑施工企业"安管人员"安全生产考核刷题系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--text2:#86868b;--border:rgba(0,0,0,.06);
    --primary:#0071e3;--primary-hover:#0077ed;--success:#30b158;--danger:#ff3b30;--warning:#ff9f0a;
    --tag-bg:#f2f5fd;--radius-sm:10px;--radius:18px;--radius-lg:24px;
}
[data-theme=dark]{
    --bg:#000;--card:#1c1c1e;--text:#f5f5f7;--text2:#98989d;--border:rgba(255,255,255,.08);
    --primary:#2997ff;--primary-hover:#40a4ff;--tag-bg:#1a2a3a;
}
[data-theme=eye]{
    --bg:#e8f0e3;--card:#f5faf2;--text:#1d281a;--text2:#6b7a65;--border:rgba(0,0,0,.05);
    --primary:#3a8c3f;--primary-hover:#2d7032;--success:#3a8c3f;--danger:#c0392b;--warning:#c77d16;
    --tag-bg:#e2f0dc;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
.container{max-width:1040px;margin:0 auto;padding:20px 24px}
.header{background:rgba(255,255,255,.72);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
[data-theme=dark] .header{background:rgba(28,28,30,.72)}
[data-theme=eye] .header{background:rgba(245,250,242,.72)}
.header h1{font-size:17px;font-weight:600;color:var(--text)}
.header-actions{display:flex;gap:10px;align-items:center}
.btn{padding:9px 20px;border:none;border-radius:980px;cursor:pointer;font-size:13px;transition:all .25s cubic-bezier(.25,.1,.25,1);font-weight:500}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover);transform:scale(1.02)}
.btn-outline{background:var(--card);border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:var(--bg)}
.btn-sm{padding:5px 14px;font-size:11px}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
.nav-tabs{display:flex;gap:5px;margin:12px 0 6px;flex-wrap:wrap}
.nav-tab{padding:7px 16px;border-radius:980px;cursor:pointer;background:var(--card);border:1px solid var(--border);font-size:11px;font-weight:500;transition:all .25s cubic-bezier(.25,.1,.25,1);white-space:nowrap;color:var(--text)}
.nav-tab.active{background:var(--text);color:var(--card);border-color:var(--text)}
.nav-tab:hover:not(.active){background:var(--bg)}
.card{background:var(--card);border-radius:var(--radius-lg);padding:20px;margin:8px 0;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--border)}
.card-header{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin:10px 0}
.stat-card{background:var(--card);border-radius:var(--radius);padding:10px 12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--border)}
.stat-num{font-size:20px;font-weight:700;color:var(--text);line-height:1.1}
.stat-label{font-size:10px;color:var(--text2);margin-top:3px;font-weight:500;letter-spacing:0}
.question-stem{font-size:15px;line-height:1.65;margin-bottom:14px;padding:16px 18px;background:var(--bg);border-radius:var(--radius)}
.question-stem .q-num{color:var(--primary);font-weight:600;font-size:14px}
.option-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;margin:5px 0;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s cubic-bezier(.25,.1,.25,1);font-size:14px;line-height:1.5;background:var(--card)}
.option-item:hover{border-color:rgba(0,0,0,.2);background:var(--bg)}
.option-item.selected{border-color:var(--primary);background:rgba(0,113,227,.04)}
.option-item.correct{border-color:var(--success);background:rgba(48,177,88,.06)}
.option-item.wrong{border-color:var(--danger);background:rgba(255,59,48,.05)}
.option-item .opt-label{font-weight:600;min-width:22px;color:var(--primary);font-size:14px}
.option-item.correct .opt-label{color:var(--success)}
.option-item.wrong .opt-label{color:var(--danger)}
.explanation-box{margin-top:16px;padding:16px 20px;background:rgba(255,159,10,.06);border-radius:var(--radius-sm);border-left:3px solid var(--warning);font-size:14px;line-height:1.6}
.explanation-box .exp-title{font-weight:600;margin-bottom:6px;color:#b06800;font-size:13px}
.answer-display{margin-top:10px;padding:10px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:14px}
.answer-display.correct-ans{background:rgba(48,177,88,.08);color:var(--success)}
.answer-display.wrong-ans{background:rgba(255,59,48,.06);color:var(--danger)}
.action-bar{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:10px 0}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .5s cubic-bezier(.25,.1,.25,1)}
.timer{font-size:28px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text)}
.timer.warning{color:var(--danger);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.4}}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--card);border-radius:var(--radius-lg);padding:32px;max-width:460px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.15);border:1px solid var(--border)}
.modal h2{font-size:22px;font-weight:700;margin-bottom:20px}
.modal input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:16px;margin:10px 0;font-family:'SF Mono','Menlo','Consolas',monospace;background:var(--bg);transition:border-color .2s}
.modal input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(0,113,227,.1)}
.search-box{width:100%;padding:10px 18px;border:1.5px solid var(--border);border-radius:980px;font-size:13px;margin:6px 0;background:var(--card);transition:all .25s}
.search-box:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(0,113,227,.08)}
.tag{display:inline-block;padding:3px 12px;border-radius:980px;font-size:11px;font-weight:500;background:var(--tag-bg);color:var(--primary);margin:2px;letter-spacing:0}
.tag-judge{background:rgba(0,113,227,.08);color:#0071e3}
.tag-single{background:rgba(48,177,88,.08);color:#30b158}
.tag-multi{background:rgba(255,59,48,.08);color:#ff3b30}
.type-filter-btn{display:inline-block;padding:8px 18px;border-radius:980px;cursor:pointer;font-size:12px;font-weight:500;transition:all .25s cubic-bezier(.25,.1,.25,1);border:1.5px solid var(--border);user-select:none;background:var(--card);color:var(--text)}
.type-filter-btn:hover{transform:scale(1.03)}
.type-filter-all.active,.type-filter-all:hover{background:var(--text);color:var(--card);border-color:var(--text)}
.type-filter-judge.active,.type-filter-judge:hover{background:#0071e3;color:#fff;border-color:#0071e3;box-shadow:0 4px 20px rgba(0,113,227,.25)}
.type-filter-single.active,.type-filter-single:hover{background:#30b158;color:#fff;border-color:#30b158;box-shadow:0 4px 20px rgba(48,177,88,.25)}
.type-filter-multi.active,.type-filter-multi:hover{background:#ff3b30;color:#fff;border-color:#ff3b30;box-shadow:0 4px 20px rgba(255,59,48,.25)}
.wrong-list-item{padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;font-size:14px;transition:background .15s}
.wrong-list-item:hover{background:var(--bg)}
.hidden{display:none!important}
@media(max-width:768px){.header h1{font-size:14px}.header{padding:12px 16px}.nav-tab{padding:7px 14px;font-size:11px}.stats-row{grid-template-columns:repeat(2,1fr)}.option-item{font-size:13px;padding:12px 14px}.card{padding:16px;border-radius:var(--radius)}.container{padding:12px}}
.loading{text-align:center;padding:60px 40px;color:var(--text2)}
.spinner{border:2.5px solid var(--border);border-top:2.5px solid var(--primary);border-radius:50%;width:28px;height:28px;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.result-card{text-align:center;padding:32px 24px}
.result-score{font-size:80px;font-weight:700;color:var(--text);line-height:1}
.result-detail{font-size:16px;color:var(--text2);margin:12px 0}
.result-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin:12px 0}
.result-bar-fill{height:100%;border-radius:5px;transition:width 1.2s cubic-bezier(.25,.1,.25,1)}
.instructions{font-size:13px;color:var(--text2);line-height:1.8;padding:18px;background:var(--bg);border-radius:var(--radius)}
.instructions kbd{background:var(--card);border:1px solid var(--border);padding:2px 7px;border-radius:4px;font-size:11px;font-family:'SF Mono','Menlo',monospace}
.qnav-grid{display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.qnav-num{width:27px;height:27px;border-radius:6px;cursor:pointer;font-size:10px;font-weight:500;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid var(--border);color:var(--text2);flex-shrink:0;transition:all .15s}
.qnav-num:hover{border-color:var(--primary);color:var(--primary)}
.qnav-num.current{box-shadow:0 0 0 2.5px var(--primary);border-color:var(--primary);font-weight:700;color:var(--primary);z-index:1;transform:scale(1.1)}
.qnav-num.correct{background:rgba(48,177,88,.1);border-color:var(--success);color:var(--success)}
.qnav-num.wrong{background:rgba(255,59,48,.08);border-color:var(--danger);color:var(--danger)}
.qnav-arrow{width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:9px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);color:var(--text2);flex-shrink:0;transition:all .15s}
.qnav-arrow:hover{border-color:var(--primary);color:var(--primary);background:var(--bg)}
.qnav-toggle{padding:3px 10px;border-radius:980px;cursor:pointer;font-size:10px;font-weight:500;border:1px solid var(--border);color:var(--text2);margin-left:6px;flex-shrink:0;white-space:nowrap;transition:all .15s}
.qnav-toggle:hover{border-color:var(--primary);color:var(--primary)}
.qnav-toggle.active{border-color:var(--primary);color:var(--primary);background:rgba(0,113,227,.06)}
</style>
</head>
<body>

<div class="header">
    <h1>🏗️ 安管人员安全生产考核刷题系统</h1>
    <div class="header-actions">
        <span style="font-size:11px;color:var(--text2)" id="activationStatus">🔒 未激活</span>
        <button class="btn btn-sm btn-outline" onclick="toggleTheme()"><span id="themeIcon">☀️</span> <span id="themeLabel">浅色</span></button>
        <span style="font-size:10px;color:var(--text2);opacity:.6;margin-right:4px">专属测试版（李瑞东）</span>
        <button class="btn btn-sm btn-outline hidden" onclick="showActivation()">🔑 激活</button>
    </div>
</div>

<div class="container">
    <!-- Activation Modal -->
    <div class="modal-overlay hidden" id="activationModal">
        <div class="modal">
            <h2>🔑 软件激活</h2>
            <p style="font-size:13px;color:var(--text2);margin-bottom:12px">
                严格一机一码，激活码绑定本设备。<br>
                请将<b>机器码</b>发送给管理员获取专属激活码。
            </p>
            <div style="background:var(--bg);padding:16px;border-radius:var(--radius-sm);margin:8px 0;text-align:center">
                <span style="font-size:12px;color:var(--text2)">本机唯一机器码：</span><br>
                <strong id="machineCode" style="font-size:22px;color:var(--primary);font-family:'SF Mono','Menlo',monospace;letter-spacing:2px">-</strong>
            </div>
            <input type="text" id="activationInput" placeholder="输入专属激活码 HNJZ-XXXX-XXXX-XXXX" maxlength="32" autocomplete="off">
            <div style="display:flex;gap:8px;margin-top:12px">
                <button class="btn btn-primary" onclick="activate()">✅ 激活</button>
                <button class="btn btn-outline" onclick="closeActivation()">取消</button>
            </div>
            <div id="activationMsg" style="margin-top:8px;font-size:13px"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainContent">
        <!-- Category Tabs -->
        <div class="nav-tabs" id="categoryTabs">
            <div class="nav-tab active" data-cat="ALL" onclick="switchCategory('ALL')">📚 全部</div>
            <div class="nav-tab" data-cat="A" onclick="switchCategory('A')">A类</div>
            <div class="nav-tab" data-cat="B" onclick="switchCategory('B')">B类</div>
            <div class="nav-tab" data-cat="C1" onclick="switchCategory('C1')">C1类</div>
            <div class="nav-tab" data-cat="C2" onclick="switchCategory('C2')">C2类</div>
            <div class="nav-tab" data-cat="C3" onclick="switchCategory('C3')">C3类</div>
        </div>

        <!-- Mode Tabs -->
        <div class="nav-tabs" id="modeTabs">
            <div class="nav-tab active" data-mode="practice" onclick="switchMode('practice')">📝 章节练习</div>
            <div class="nav-tab" data-mode="exam" onclick="switchMode('exam')">⏱️ 模拟考试</div>
            <div class="nav-tab" data-mode="fav" onclick="switchMode('fav')">⭐ 收藏夹</div>
            <div class="nav-tab" data-mode="wrong" onclick="switchMode('wrong')">📕 错题本</div>
            <div class="nav-tab" data-mode="stats" onclick="switchMode('stats')">📊 进度统计</div>
        </div>

        <!-- Search & Filter -->
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索题目关键词..." oninput="doSearch()">
        <div style="display:flex;gap:8px;margin:10px 0;flex-wrap:wrap" id="typeFilter">
            <span class="type-filter-btn type-filter-all active" data-type="all" onclick="setTypeFilter('all')" id="typeAllTag">📦 全部题型</span>
            <span class="type-filter-btn type-filter-judge" data-type="判断" onclick="setTypeFilter('判断')">✅ 判断题</span>
            <span class="type-filter-btn type-filter-single" data-type="单选" onclick="setTypeFilter('单选')">📋 单选题</span>
            <span class="type-filter-btn type-filter-multi" data-type="多选" onclick="setTypeFilter('多选')">📋 多选题</span>
        </div>

        <div class="stats-row" id="miniStats"></div>

        <!-- Practice View -->
        <div id="practiceView">
            <div class="card" id="questionCard">
                <div id="questionContent"></div>
                <div class="action-bar">
                    <button class="btn btn-sm btn-warning" id="wrongBookBtn" onclick="toggleWrongBook()">⭐ 收藏</button>
                    <button class="btn btn-outline" id="prevBtn" onclick="prevQuestion()">◀ 上一题</button>
                    <button class="btn btn-outline" id="nextBtn" onclick="nextQuestion()">下一题 ▶</button>
                    <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()">✅ 提交答案</button>
                </div>
                <div id="answerFeedback"></div>
            </div>
            <div class="card" id="questionNav" style="max-height:300px;overflow-y:auto"></div>
        </div>

        <!-- Exam View -->
        <div id="examView" class="hidden">
            <div class="card" style="text-align:center" id="examSetup">
                <h3 style="margin-bottom:16px;font-size:20px;font-weight:600">⏱️ 模拟考试</h3>
                <div style="margin:12px 0">
                    <label style="font-size:14px;color:var(--text2)">题目数量：</label>
                    <select id="examCount" style="padding:10px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:14px;background:var(--card)">
                        <option value="30">30题</option>
                        <option value="50">50题</option>
                        <option value="100" selected>100题</option>
                        <option value="200">200题</option>
                    </select>
                    &nbsp;&nbsp;
                    <label style="font-size:14px;color:var(--text2)">考试时间：</label>
                    <select id="examTime" style="padding:10px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:14px;background:var(--card)">
                        <option value="45">45分钟</option>
                        <option value="60">60分钟</option>
                        <option value="90" selected>90分钟</option>
                        <option value="120">120分钟</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="startExam()" style="font-size:15px;padding:12px 36px">开始考试</button>
            </div>
            <div id="examRunning" class="hidden">
                <div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
                    <span style="font-weight:600"><span id="examProgress">1/1</span> 题</span>
                    <div class="timer" id="examTimer">90:00</div>
                    <button class="btn btn-danger btn-sm" onclick="submitExam()">📝 交卷</button>
                </div>
                <div class="card" id="examQuestionCard">
                    <div id="examQuestionContent"></div>
                    <div class="action-bar">
                        <button class="btn btn-outline" onclick="examPrev()">◀ 上一题</button>
                        <button class="btn btn-outline" onclick="examNext()">下一题 ▶</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">📋 答题卡</div>
                    <div id="examAnswerGrid" style="display:flex;flex-wrap:wrap;gap:5px;max-height:300px;overflow-y:auto"></div>
                </div>
            </div>
            <div id="examResult" class="hidden">
                <div class="card result-card">
                    <h2 style="font-size:22px;font-weight:600;margin-bottom:16px">📊 考试结果</h2>
                    <div class="result-score" id="resultScore">0</div>
                    <div style="font-size:18px;color:var(--text2)">分</div>
                    <div class="result-detail" id="resultDetail"></div>
                    <div class="result-bar"><div class="result-bar-fill" id="resultBarFill" style="width:0;background:var(--success)"></div></div>
                    <button class="btn btn-primary" onclick="resetExam()" style="margin-top:20px">返回模拟考试</button>
                </div>
            </div>
        </div>

        <!-- Favorites View -->
        <div id="favView" class="hidden">
            <div class="card">
                <div class="card-header">
                    <span>⭐ 我的收藏夹</span>
                    <button class="btn btn-sm btn-outline" onclick="clearFavorites()">🗑️ 清空</button>
                </div>
                <div id="favList"></div>
                <div id="favEmpty" style="text-align:center;padding:40px;color:var(--text2)">暂无收藏，点击 ⭐收藏 按钮添加</div>
            </div>
        </div>

        <!-- Wrong Book View -->
        <div id="wrongView" class="hidden">
            <div class="card">
                <div class="card-header">
                    <span>📕 我的错题本</span>
                    <button class="btn btn-sm btn-outline" onclick="clearWrongBook()">🗑️ 清空</button>
                </div>
                <div id="wrongList"></div>
                <div id="wrongEmpty" style="text-align:center;padding:40px;color:var(--text2)">🎉 暂无错题，继续保持！</div>
            </div>
        </div>

        <!-- Stats View -->
        <div id="statsView" class="hidden">
            <div class="stats-row" id="statsCards"></div>
            <div class="card">
                <div class="card-header">📈 分类练习进度</div>
                <div id="categoryProgress"></div>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loadingView" class="loading">
        <div class="spinner"></div>
        <p>正在加载题库...</p>
    </div>
</div>

<script>
let ALL_QUESTIONS=[];
function mergeQuestions(){const cats=['A','B','C1','C2','C3'];for(const cat of cats){const qs=window['QUESTIONS_'+cat];if(qs&&Array.isArray(qs))ALL_QUESTIONS.push(...qs);}}
const S={activated:false,machineCode:'',questions:[],filtered:[],currentIdx:0,mode:'practice',category:'ALL',typeFilter:'all',answerState:null,selectedOpts:[],wrongBook:{},favorites:{},progress:{},exam:{active:false,questions:[],answers:{},idx:0,timer:null,timeLeft:0,totalTime:0},searchQuery:'',questionHistory:{}};
function getDeviceId(){let id=localStorage.getItem('hnsafety_device_id');if(!id){const arr=new Uint8Array(8);crypto.getRandomValues(arr);id=Array.from(arr).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase();localStorage.setItem('hnsafety_device_id',id);}return id;}
function genValidCode(did){let seed=0;for(let i=0;i<did.length;i++){seed=((seed<<5)-seed)+did.charCodeAt(i);seed|=0;}const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let code='';seed=Math.abs(seed);for(let i=0;i<16;i++){seed=(seed*1103515245+12345)&0x7FFFFFFF;code+=chars[seed%chars.length];if(i===3||i===7||i===11)code+='-';}return'HNJZ-'+code.substring(5);}
function validateCode(input,did){return input.toUpperCase().replace(/\s/g,'')===genValidCode(did);}
function checkActivation(){try{const d=JSON.parse(localStorage.getItem('hnsafety_act')||'{}');const did=getDeviceId();if(d.deviceId===did&&d.ok){S.activated=true;S.machineCode=did;return true;}}catch(e){}return false;}
function saveActivation(){localStorage.setItem('hnsafety_act',JSON.stringify({ok:true,deviceId:S.machineCode,ts:Date.now()}));}
function showActivation(){document.getElementById('activationModal').classList.remove('hidden');document.getElementById('machineCode').textContent=getDeviceId();document.getElementById('activationMsg').innerHTML='';document.getElementById('activationInput').value='';document.getElementById('activationInput').focus();}
function closeActivation(){document.getElementById('activationModal').classList.add('hidden');}
function activate(){const input=document.getElementById('activationInput').value.trim();const did=getDeviceId();if(!input){document.getElementById('activationMsg').innerHTML='<span style=\"color:var(--danger)\">请输入激活码</span>';return;}if(validateCode(input,did)){S.activated=true;S.machineCode=did;saveActivation();document.getElementById('activationMsg').innerHTML='<span style=\"color:var(--success)\">✅ 激活成功！正在加载...</span>';document.getElementById('activationStatus').textContent='✅ 已激活';setTimeout(()=>{closeActivation();initApp();},300);}else{document.getElementById('activationMsg').innerHTML='<span style=\"color:var(--danger)\">❌ 激活码无效！<br>请将机器码发送给管理员获取激活码。</span>';}}
function loadData(){S.questions=ALL_QUESTIONS;try{S.wrongBook=JSON.parse(localStorage.getItem('hnsafety_wb')||'{}');}catch(e){S.wrongBook={};}try{S.favorites=JSON.parse(localStorage.getItem('hnsafety_fv')||'{}');}catch(e){S.favorites={};}try{S.progress=JSON.parse(localStorage.getItem('hnsafety_pr')||'{}');}catch(e){S.progress={};}applyFilters();}
function applyFilters(){let qs=S.questions;if(S.category!=='ALL')qs=qs.filter(q=>q.category===S.category+'类');if(S.typeFilter!=='all')qs=qs.filter(q=>q.type===S.typeFilter);if(S.searchQuery)qs=qs.filter(q=>q.stem.toLowerCase().includes(S.searchQuery));S.filtered=qs;updateMiniStats();}
function doSearch(){S.searchQuery=document.getElementById('searchInput').value.trim().toLowerCase();applyFilters();S.currentIdx=0;S.answerState=null;S.selectedOpts=[];if(S.mode==='practice')renderPractice();}
function setTypeFilter(type){S.typeFilter=type;document.querySelectorAll('#typeFilter .type-filter-btn').forEach(t=>t.classList.toggle('active',t.dataset.type===type));applyFilters();S.currentIdx=0;S.answerState=null;S.selectedOpts=[];renderCurrentMode();}
function updateMiniStats(){const t=S.filtered.length;const cat=S.category==='ALL'?'全部':S.category+'类';const typ=S.typeFilter==='all'?'全部题型':S.typeFilter;document.getElementById('miniStats').innerHTML='<div class=\"stat-card\"><div class=\"stat-num\">'+t+'</div><div class=\"stat-label\">当前题目</div></div><div class=\"stat-card\"><div class=\"stat-num\">'+cat+'</div><div class=\"stat-label\">类别</div></div><div class=\"stat-card\"><div class=\"stat-num\">'+typ+'</div><div class=\"stat-label\">题型</div></div><div class=\"stat-card\"><div class=\"stat-num\">'+Object.keys(S.wrongBook).length+'</div><div class=\"stat-label\">错题数</div></div>';}
function switchCategory(cat){S.category=cat;document.querySelectorAll('#categoryTabs .nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===cat));applyFilters();S.currentIdx=0;S.answerState=null;S.selectedOpts=[];renderCurrentMode();}
function switchMode(mode){S.mode=mode;document.querySelectorAll('#modeTabs .nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===mode));document.getElementById('practiceView').classList.toggle('hidden',mode!=='practice');document.getElementById('examView').classList.toggle('hidden',mode!=='exam');document.getElementById('favView').classList.toggle('hidden',mode!=='fav');document.getElementById('wrongView').classList.toggle('hidden',mode!=='wrong');document.getElementById('statsView').classList.toggle('hidden',mode!=='stats');renderCurrentMode();}
function renderCurrentMode(){if(S.mode==='practice')renderPractice();if(S.mode==='fav')renderFavorites();if(S.mode==='wrong')renderWrongBook();if(S.mode==='stats')renderStats();if(S.mode==='exam')resetExam();}
function renderPractice(){const qs=S.filtered;if(!qs.length){document.getElementById('questionContent').innerHTML='<div style=\"text-align:center;padding:40px;color:var(--text2)\">😕 没有找到匹配的题目，请调整筛选条件</div>';document.getElementById('questionNav').innerHTML='';document.getElementById('submitBtn').classList.add('hidden');document.getElementById('nextBtn').disabled=true;document.getElementById('prevBtn').disabled=true;return;}const idx=Math.min(S.currentIdx,qs.length-1);const q=qs[idx];const qKey=q.id||q.stem.substring(0,60);const prevResult=S.questionHistory[qKey];const typeClass=q.type==='判断'?'judge':q.type==='单选'?'single':'multi';let html='<div class=\"question-stem\"><span class=\"q-num\">#'+(idx+1)+'/'+qs.length+'</span> <span class=\"tag tag-'+typeClass+'\">'+q.type+'题</span> <span style=\"color:var(--text2);font-size:11px\">['+q.category+']</span><br><br>'+q.stem+'</div><div id=\"optionsList\">';q.options.forEach((opt,i)=>{const letter=String.fromCharCode(65+i);let cls='option-item';if(S.selectedOpts.includes(i))cls+=' selected';if(S.answerState==='answered'){const corrects=q.answer.split('');if(corrects.includes(letter))cls+=' correct';else if(S.selectedOpts.includes(i)&&!corrects.includes(letter))cls+=' wrong';}const onclick=S.answerState!=='answered'?'onclick=\"selectOption('+i+')\"':'';html+='<div class=\"'+cls+'\" '+onclick+'><span class=\"opt-label\">'+letter+'.</span>'+opt.replace(/^[A-E][、,，]\s*/,'')+'</div>';});html+='</div>';document.getElementById('questionContent').innerHTML=html;document.getElementById('answerFeedback').innerHTML='';document.getElementById('submitBtn').classList.toggle('hidden',S.answerState==='answered');document.getElementById('nextBtn').disabled=S.currentIdx>=qs.length-1;document.getElementById('prevBtn').disabled=S.currentIdx<=0;const favKey=q.id||q.stem.substring(0,60);const isFaved=!!S.favorites[favKey];document.getElementById('wrongBookBtn').textContent=isFaved?'⭐ 已收藏':'☆ 收藏';document.getElementById('wrongBookBtn').className=isFaved?'btn btn-sm btn-warning':'btn btn-sm btn-outline';if(S.answerState==='answered'){const correct=checkAnswer(q);const fbCls=correct?'correct-ans':'wrong-ans';const fbTxt=correct?'✅ 回答正确！':'❌ 回答错误';document.getElementById('answerFeedback').innerHTML='<div class=\"answer-display '+fbCls+'\">'+fbTxt+' 正确答案：<b>'+q.answer+'</b></div><div class=\"explanation-box\"><div class=\"exp-title\">📖 解析</div>'+(q.explanation||'暂无详细解析')+'</div>';}else if(prevResult){const fbCls=prevResult==='correct'?'correct-ans':'wrong-ans';const fbTxt=prevResult==='correct'?'✅ 上次回答正确！':'❌ 上次回答错误';document.getElementById('answerFeedback').innerHTML='<div class=\"answer-display '+fbCls+'\">'+fbTxt+' 正确答案：<b>'+q.answer+'</b></div><div class=\"explanation-box\"><div class=\"exp-title\">📖 解析</div>'+(q.explanation||'暂无详细解析')+'</div>';}renderQuestionNav();}
function selectOption(idx){const q=S.filtered[S.currentIdx];if(q.type==='单选'||q.type==='判断')S.selectedOpts=[idx];else if(q.type==='多选'){const ei=S.selectedOpts.indexOf(idx);if(ei>=0)S.selectedOpts.splice(ei,1);else S.selectedOpts.push(idx);}renderPractice();}
function submitAnswer(){if(!S.selectedOpts.length)return;S.answerState='answered';const q=S.filtered[S.currentIdx];const qKey=q.id||q.stem.substring(0,60);const ua=S.selectedOpts.map(i=>String.fromCharCode(65+i)).sort().join('');const correct=ua===q.answer;S.questionHistory[qKey]=correct?'correct':'wrong';const cat=q.category.replace('类','');if(!S.progress[cat])S.progress[cat]={total:0,correct:0,byType:{}};S.progress[cat].total++;if(correct)S.progress[cat].correct++;if(!S.progress[cat].byType[q.type])S.progress[cat].byType[q.type]={total:0,correct:0};S.progress[cat].byType[q.type].total++;if(correct)S.progress[cat].byType[q.type].correct++;saveProgress();if(!correct){S.wrongBook[qKey]={...q,wc:(S.wrongBook[qKey]?.wc||0)+1,lw:Date.now()};saveWrongBook();}else if(S.wrongBook[qKey]){delete S.wrongBook[qKey];saveWrongBook();}renderPractice();updateMiniStats();}
function nextQuestion(){if(S.currentIdx<S.filtered.length-1){S.currentIdx++;S.answerState=null;S.selectedOpts=[];renderPractice();}}
function prevQuestion(){if(S.currentIdx>0){S.currentIdx--;S.answerState=null;S.selectedOpts=[];renderPractice();}}
function checkAnswer(q){return S.selectedOpts.map(i=>String.fromCharCode(65+i)).sort().join('')===q.answer;}
function toggleWrongBook(){const q=S.filtered[S.currentIdx];const key=q.id||q.stem.substring(0,60);if(S.favorites[key]){delete S.favorites[key];}else{S.favorites[key]={...q,ts:Date.now()};}saveFavorites();renderPractice();}
function renderQuestionNav(){const qs=S.filtered;const total=qs.length;const PER_PAGE=30;let navStart=S.currentIdx-Math.floor(PER_PAGE/2);let navEnd=navStart+PER_PAGE;if(navStart<0){navStart=0;navEnd=Math.min(PER_PAGE,total);}if(navEnd>total){navEnd=total;navStart=Math.max(0,navEnd-PER_PAGE);}if(showAllNav){navStart=0;navEnd=Math.min(total,100);}let html='<div style=\"margin-bottom:6px;font-size:12px;color:var(--text2)\">共 <b>'+total+'</b> 题（'+(navStart+1)+'-'+navEnd+'）| <span style=\"color:var(--success)\">●</span>正确 <span style=\"color:var(--danger)\">●</span>错误 <span style=\"color:var(--border)\">●</span>未答</div>';html+='<div class=\"qnav-grid\">';if(navStart>0){html+='<span class=\"qnav-arrow\" onclick=\"jumpToNavPage('+(navStart-1)+')\" title=\"上一页\">◀</span>';}for(let i=navStart;i<navEnd;i++){const q=qs[i];const qKey=q.id||q.stem.substring(0,60);const result=S.questionHistory[qKey];let cls='qnav-num';if(i===S.currentIdx)cls+=' current';if(result==='correct')cls+=' correct';else if(result==='wrong')cls+=' wrong';html+='<span class=\"'+cls+'\" onclick=\"jumpToQuestion('+i+')\">'+(i+1)+'</span>';}if(navEnd<total){html+='<span class=\"qnav-arrow\" onclick=\"jumpToNavPage('+navEnd+')\" title=\"下一页\">▶</span>';}if(showAllNav){html+='<span class=\"qnav-toggle active\" onclick=\"showAllNav=false;renderQuestionNav()\">🔄 恢复</span>';}else{html+='<span class=\"qnav-toggle\" onclick=\"showAllNav=true;renderQuestionNav()\">📋 展开</span>';}html+='</div>';document.getElementById('questionNav').innerHTML=html;}
let showAllNav=false;
function jumpToNavPage(tgt){showAllNav=false;S.currentIdx=Math.max(0,Math.min(S.filtered.length-1,tgt));S.answerState=null;S.selectedOpts=[];renderPractice();}
function jumpToQuestion(idx){showAllNav=false;S.currentIdx=idx;S.answerState=null;S.selectedOpts=[];renderPractice();}
function startExam(){const count=parseInt(document.getElementById('examCount').value);const timeMin=parseInt(document.getElementById('examTime').value);const pool=S.filtered.length?[...S.filtered]:[...S.questions];for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}S.exam.questions=pool.slice(0,Math.min(count,pool.length));S.exam.answers={};S.exam.idx=0;S.exam.timeLeft=timeMin*60;S.exam.totalTime=timeMin*60;S.exam.active=true;document.getElementById('examSetup').classList.add('hidden');document.getElementById('examRunning').classList.remove('hidden');document.getElementById('examResult').classList.add('hidden');renderExamQuestion();if(S.exam.timer)clearInterval(S.exam.timer);S.exam.timer=setInterval(()=>{S.exam.timeLeft--;updateExamTimer();if(S.exam.timeLeft<=0)submitExam();},1000);}
function updateExamTimer(){const m=Math.floor(S.exam.timeLeft/60),s=S.exam.timeLeft%60;const el=document.getElementById('examTimer');el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');el.classList.toggle('warning',S.exam.timeLeft<300);document.getElementById('examProgress').textContent=(S.exam.idx+1)+'/'+S.exam.questions.length;}
function renderExamQuestion(){if(!S.exam.questions.length)return;const q=S.exam.questions[S.exam.idx];const saved=S.exam.answers[S.exam.idx]||[];const tc=q.type==='判断'?'judge':q.type==='单选'?'single':'multi';let html='<div class=\"question-stem\"><span class=\"q-num\">#'+(S.exam.idx+1)+'/'+S.exam.questions.length+'</span> <span class=\"tag tag-'+tc+'\">'+q.type+'题</span> <span style=\"color:var(--text2);font-size:11px\">['+q.category+']</span><br><br>'+q.stem+'</div><div>';q.options.forEach((opt,i)=>{let cls='option-item';if(saved.includes(i))cls+=' selected';html+='<div class=\"'+cls+'\" onclick=\"selectExamOpt('+i+')\"><span class=\"opt-label\">'+String.fromCharCode(65+i)+'.</span>'+opt.replace(/^[A-E][、,，]\s*/,'')+'</div>';});html+='</div>';document.getElementById('examQuestionContent').innerHTML=html;renderExamSheet();}
function selectExamOpt(idx){const q=S.exam.questions[S.exam.idx];let saved=S.exam.answers[S.exam.idx]||[];if(q.type==='单选'||q.type==='判断')saved=[idx];else{const ei=saved.indexOf(idx);if(ei>=0)saved.splice(ei,1);else saved.push(idx);}S.exam.answers[S.exam.idx]=saved;renderExamQuestion();}
function examPrev(){if(S.exam.idx>0){S.exam.idx--;renderExamQuestion();}}
function examNext(){if(S.exam.idx<S.exam.questions.length-1){S.exam.idx++;renderExamQuestion();}}
function renderExamSheet(){let html='';for(let i=0;i<S.exam.questions.length;i++){const answered=(S.exam.answers[i]||[]).length>0;let style='width:34px;height:34px;border-radius:6px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)';if(answered)style+=';background:var(--primary);color:#fff';if(i===S.exam.idx)style+=';box-shadow:0 0 0 3px var(--warning)';html+='<div style=\"'+style+'\" onclick=\"S.exam.idx='+i+';renderExamQuestion()\">'+(i+1)+'</div>';}document.getElementById('examAnswerGrid').innerHTML=html;}
function submitExam(){if(S.exam.timer)clearInterval(S.exam.timer);S.exam.active=false;let correct=0;const total=S.exam.questions.length;for(let i=0;i<total;i++){const q=S.exam.questions[i];const ua=(S.exam.answers[i]||[]).map(idx=>String.fromCharCode(65+idx)).sort().join('');if(ua===q.answer)correct++;else{const key=q.id||q.stem.substring(0,60);S.wrongBook[key]={...q,wc:(S.wrongBook[key]?.wc||0)+1,lw:Date.now()};}}saveWrongBook();const score=Math.round((correct/total)*100);document.getElementById('examRunning').classList.add('hidden');document.getElementById('examResult').classList.remove('hidden');document.getElementById('resultScore').textContent=score;document.getElementById('resultDetail').textContent='正确 '+correct+' 题 / 共 '+total+' 题 | 用时 '+Math.floor((S.exam.totalTime-S.exam.timeLeft)/60)+'分'+(S.exam.totalTime-S.exam.timeLeft)%60+'秒';const bar=document.getElementById('resultBarFill');bar.style.width=score+'%';bar.style.background=score<60?'var(--danger)':score<80?'var(--warning)':'var(--success)';}
function resetExam(){if(S.exam.timer)clearInterval(S.exam.timer);S.exam={active:false,questions:[],answers:{},idx:0,timer:null,timeLeft:0,totalTime:0};document.getElementById('examSetup').classList.remove('hidden');document.getElementById('examRunning').classList.add('hidden');document.getElementById('examResult').classList.add('hidden');}
function renderFavorites(){const entries=Object.values(S.favorites);document.getElementById('favEmpty').classList.toggle('hidden',entries.length>0);entries.sort((a,b)=>(b.ts||0)-(a.ts||0));let html='';entries.forEach((q,idx)=>{const tc=q.type==='判断'?'judge':q.type==='单选'?'single':'multi';html+='<div class=\"wrong-list-item\" onclick=\"reviewFav(\''+(q.id||q.stem.substring(0,30))+'\')\" style=\"display:flex;align-items:center;gap:8px\"><span style=\"color:var(--text2);font-size:12px\">#'+(idx+1)+'</span><span class=\"tag tag-'+tc+'\">'+q.type+'</span><span style=\"color:var(--text2);font-size:11px\">['+q.category+']</span><span style=\"flex:1\">'+q.stem.substring(0,60)+'...</span><span style=\"cursor:pointer;color:var(--danger)\" onclick=\"event.stopPropagation();delete S.favorites[\''+(q.id||q.stem.substring(0,30))+'\'];saveFavorites();renderFavorites();\">✕</span></div>';});document.getElementById('favList').innerHTML=html;}
function reviewFav(key){const q=S.favorites[key];if(!q)return;S.filtered=[q];S.currentIdx=0;S.answerState=null;S.selectedOpts=[];switchMode('practice');}
function clearFavorites(){if(confirm('确定要清空所有收藏吗？')){S.favorites={};saveFavorites();renderFavorites();}}
function saveFavorites(){localStorage.setItem('hnsafety_fv',JSON.stringify(S.favorites));}
function renderWrongBook(){const entries=Object.values(S.wrongBook);document.getElementById('wrongEmpty').classList.toggle('hidden',entries.length>0);entries.sort((a,b)=>(b.lw||0)-(a.lw||0));let html='';entries.forEach((q,idx)=>{const tc=q.type==='判断'?'judge':q.type==='单选'?'single':'multi';html+='<div class=\"wrong-list-item\" onclick=\"reviewWrong(\''+(q.id||q.stem.substring(0,30))+'\')\" style=\"display:flex;align-items:center;gap:8px\"><span style=\"color:var(--text2);font-size:12px\">#'+(idx+1)+'</span><span class=\"tag tag-'+tc+'\">'+q.type+'</span><span style=\"color:var(--text2);font-size:11px\">['+q.category+']</span><span style=\"flex:1\">'+q.stem.substring(0,60)+'...</span><span style=\"color:var(--danger);font-weight:600\">✘'+(q.wc||1)+'</span></div>';});document.getElementById('wrongList').innerHTML=html;}
function reviewWrong(key){const q=S.wrongBook[key];if(!q)return;S.filtered=[q];S.currentIdx=0;S.answerState=null;S.selectedOpts=[];switchMode('practice');}
function clearWrongBook(){if(confirm('确定要清空所有错题吗？此操作不可撤销。')){S.wrongBook={};saveWrongBook();renderWrongBook();updateMiniStats();}}
function renderStats(){const cats=['A','B','C1','C2','C3'];let html='';let totQ=0,totA=0,totC=0;for(const cat of cats){const p=S.progress[cat]||{total:0,correct:0};totA+=p.total;totC+=p.correct;const catQs=S.questions.filter(q=>q.category===cat+'类').length;totQ+=catQs;const pct=p.total>0?Math.round((p.correct/p.total)*100):0;html+='<div class=\"stat-card\"><div class=\"stat-num\">'+pct+'%</div><div class=\"stat-label\">'+cat+'类 正确率 ('+p.correct+'/'+p.total+')</div><div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:'+pct+'%\"></div></div></div>';}html+='<div class=\"stat-card\"><div class=\"stat-num\">'+Object.keys(S.wrongBook).length+'</div><div class=\"stat-label\">错题数</div></div><div class=\"stat-card\"><div class=\"stat-num\">'+totQ+'</div><div class=\"stat-label\">题库总数</div></div><div class=\"stat-card\"><div class=\"stat-num\">'+totA+'</div><div class=\"stat-label\">已练习</div></div>';document.getElementById('statsCards').innerHTML=html;let detail='';for(const cat of cats){const p=S.progress[cat]||{total:0,correct:0,byType:{}};detail+='<div style=\"margin:6px 0\"><strong>'+cat+'类：</strong>';for(const type of['判断','单选','多选']){const tp=p.byType[type]||{total:0,correct:0};const pct=tp.total>0?Math.round((tp.correct/tp.total)*100):0;detail+='<span class=\"tag tag-'+(type==='判断'?'judge':type==='单选'?'single':'multi')+'\">'+type+': '+pct+'% ('+tp.correct+'/'+tp.total+')</span> ';}detail+='</div>';}document.getElementById('categoryProgress').innerHTML=detail||'<p style=\"color:var(--text2);padding:16px\">暂无练习记录，开始刷题吧！</p>';}
function saveWrongBook(){localStorage.setItem('hnsafety_wb',JSON.stringify(S.wrongBook));}
function saveProgress(){localStorage.setItem('hnsafety_pr',JSON.stringify(S.progress));}
function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme')||'';const themes=['','dark','eye'];const icons={'':'☀️','dark':'🌙','eye':'🌿'};const labels={'':'浅色','dark':'深色','eye':'护眼'};const curIdx=themes.indexOf(cur);const nextIdx=(curIdx+1)%themes.length;const next=themes[nextIdx];document.documentElement.setAttribute('data-theme',next);localStorage.setItem('hnsafety_theme',next);document.getElementById('themeIcon').textContent=icons[next];document.getElementById('themeLabel').textContent=labels[next];}
(function(){const saved=localStorage.getItem('hnsafety_theme');if(saved)document.documentElement.setAttribute('data-theme',saved);const icons={'':'☀️','dark':'🌙','eye':'🌿'};const labels={'':'浅色','dark':'深色','eye':'护眼'};const cur=document.documentElement.getAttribute('data-theme')||'';document.getElementById('themeIcon').textContent=icons[cur]||'☀️';document.getElementById('themeLabel').textContent=labels[cur]||'浅色';})();
document.addEventListener('keydown',function(e){if(document.getElementById('activationModal').classList.contains('hidden')===false)return;if(S.exam.active){if(e.key==='ArrowLeft'){e.preventDefault();examPrev();}if(e.key==='ArrowRight'){e.preventDefault();examNext();}const n=parseInt(e.key);if(n>=1&&n<=5){e.preventDefault();selectExamOpt(n-1);}return;}if(S.mode==='practice'){if(S.answerState!=='answered'){const n=parseInt(e.key);if(n>=1&&n<=5){e.preventDefault();selectOption(n-1);}if(e.key==='Enter'){e.preventDefault();submitAnswer();}}if(e.key==='ArrowRight'){e.preventDefault();nextQuestion();}if(e.key==='ArrowLeft'){e.preventDefault();prevQuestion();}}});
function initApp(){mergeQuestions();loadData();document.getElementById('loadingView').classList.add('hidden');document.getElementById('mainContent').classList.remove('hidden');switchCategory('ALL');switchMode('practice');}
document.addEventListener('DOMContentLoaded',function(){document.getElementById('activationStatus').textContent='';S.activated=true;initApp();});
</script>
